    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .subtitle { color: #94a3b8; font-size: 1.2rem; }
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
        }
        .stat { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #00d4ff; }
        .stat-label { color: #64748b; font-size: 0.9rem; }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
        }
        .filter-btn {
            padding: 10px 20px;
            border: 1px solid #334155;
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
            border-color: transparent;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 25px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
        }
        .product-card:hover::before { opacity: 1; }
        .product-id {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 8px;
        }
        .product-name {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #fff;
        }
        .product-desc {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }
        .tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            background: rgba(124, 58, 237, 0.2);
            color: #a78bfa;
            border-radius: 12px;
        }
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #334155;
        }
        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4ff;
        }
        .product-category {
            font-size: 0.8rem;
            padding: 6px 12px;
            background: rgba(0,212,255,0.1);
            color: #00d4ff;
            border-radius: 20px;
            text-transform: capitalize;
        }
        .no-products {
            text-align: center;
            color: #64748b;
            padding: 50px;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .stats { flex-direction: column; gap: 20px; }
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        const categories = [...new Set(products.map(p => p.category))];
        
        const filterBar = document.querySelector('.filter-bar');
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.category = cat;
            btn.textContent = cat.replace(/-/g, ' ');
            filterBar.appendChild(btn);
        });

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('productsGrid');
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-products">No products found in this category.</div>';
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-id">${p.id}</div>
                    <h3 class="product-name">${p.name}</h3>
                    <p class="product-desc">${p.description}</p>
                    <div class="product-tags">
                        ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    <div class="product-footer">
                        <span class="product-price">$${p.price.toFixed(2)}</span>
                        <span class="product-category">${p.category.replace(/-/g, ' ')}</span>
                    </div>
                </div>
            `).join('');
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderProducts(btn.dataset.category);
            });
        });

        renderProducts();
    </script>
